        }

    </style>
</head>

    // Seeded PRNG (mulberry32) — mismo resultado en cada carga de página
    let _seed = 42;
    const seededRand = () => {
        _seed |= 0; _seed = _seed + 0x6D2B79F5 | 0;
        let t = Math.imul(_seed ^ _seed >>> 15, 1 | _seed);

    for(let i = 0; i < 245; i++) {

    const INITIAL_GROUP_SPLIT = {
        A: new Set(_sorted.slice(0, _mid).map(x => x.i)),
        B: new Set(_sorted.slice(_mid).map(x => x.i))
    };

    // --- ESTADO GLOBAL ---
    let map, directionsService, placesService;
    let markers = [], polylines = [], userMarker, userAccCircle;
    
    let state = {
        userLoc: null, userAcc: 0,
        raw: [...RAW_INITIAL_DATA],
        statuses: {}, notes: {}, 
        showVisited: true,
        panelState: 'compressed',
        routeOrder: [],
        lastSearchTime: 0,
        userId: null,
        userGroup: null,
        sessionStartTime: Date.now(),
        lastMapMoveTime: Date.now()
    };

    // --- FIREBASE LOGIC ---
    let app, auth, db, rtdb;

    if (!isFirebaseConfigured) {
        const banner = document.createElement('div');
        banner.style = "position:fixed; top:70px; left:20px; right:20px; background:var(--accent-red); color:white; padding:15px; border-radius:12px; z-index:5000; font-size:12px; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); text-align:center;";
        banner.innerText = "Configurá Firebase: abrí el HTML, buscá FIREBASE_CONFIG y completá los 6 campos con los datos de tu proyecto en console.firebase.google.com";
        document.body.appendChild(banner);
    } else {
        app = initializeApp(FIREBASE_CONFIG);
        auth = getAuth(app);
        db = getFirestore(app, FIRESTORE_DB_ID);
        if (RTDB_URL) rtdb = getDatabase(app, RTDB_URL);
    }
    const getSessionId = () => new Date().toISOString().split('T')[0];

    async function assignUserGroup(uid, email) {
        const configRef = doc(db, 'config', 'userGroups');
        const snap = await getDoc(configRef);
        const data = snap.exists() ? snap.data() : {};

        if (data.A?.uid === uid) return 'A';
        if (data.B?.uid === uid) return 'B';

        if (!data.A) {
            await setDoc(configRef, { A: { uid, email, assignedAt: Date.now() } }, { merge: true });
            return 'A';
        }
        if (!data.B) {
            await setDoc(configRef, { B: { uid, email, assignedAt: Date.now() } }, { merge: true });
            return 'B';
        }
        return null;
    }

    async function handleLogin() {
        if (!isFirebaseConfigured) return showToast("⚠ Modo local activo");
        const provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); } catch (err) { console.error(err); showToast("❌ Error al iniciar sesión"); }
    }

    async function handleLogout() {
        if (!isFirebaseConfigured) return location.reload();
        try {
            await signOut(auth);
            location.reload();
        } catch (err) { console.error(err); }
    }

    async function updateAuthUI(user) {
        const overlay = document.getElementById('login-overlay');
        const userInfo = document.getElementById('user-info');
        const loginBtn = document.getElementById('login-btn');
        const userName = document.getElementById('user-name');
        const groupBadge = document.getElementById('group-badge');

        if (user) {
            const group = await assignUserGroup(user.uid, user.email || '');
            if (!group) {
                showToast('❌ Cupo completo: ya hay 2 usuarios activos');
                await signOut(auth);
                return;
            }
            state.userId = user.uid;
            state.userGroup = group;
            state.userName = user.displayName || `Zona ${group}`;
            overlay.style.display = 'none';
            userInfo.style.display = 'flex';
            loginBtn.style.display = 'none';
            userName.innerText = user.displayName ? user.displayName.split(' ')[0] : 'Admin';

            const groupColor = group === 'A' ? 'var(--accent-blue)' : 'var(--accent-violet)';
            groupBadge.innerText = `ZONA ${group}`;
            groupBadge.style.cssText = `display:inline-block; background:${groupColor}; color:white; padding:3px 8px; border-radius:8px; font-size:0.6rem; font-weight:900;`;

            startSync();
        } else {
            overlay.style.display = isFirebaseConfigured ? 'flex' : 'none';
            userInfo.style.display = 'none';
            loginBtn.style.display = 'inline';
            if (groupBadge) groupBadge.style.display = 'none';
            if (!isFirebaseConfigured) {
                loginBtn.innerText = "MODO LOCAL";
                startSync();
            }
            state.userId = null;
            state.userGroup = null;
        }
    }

    function isShopVisible(idx) {
        const shop = state.raw[idx];
        if (!state.userGroup) return true;
        if (shop && (shop.source === 'places_api' || shop.source === 'firestore')) return true;
        return INITIAL_GROUP_SPLIT[state.userGroup].has(idx);
    }

    if (isFirebaseConfigured) {
        onAuthStateChanged(auth, updateAuthUI);
    } else {
        updateAuthUI(null);
    }

    let syncUnsubscribe = null;
    async function startSync() {
        if (!isFirebaseConfigured) {
            state.statuses = JSON.parse(localStorage.getItem('brt_statuses') || '{}');
            state.notes = JSON.parse(localStorage.getItem('brt_notes') || '{}');
            recalculateRoute();
            showToast("💾 Datos locales cargados");
            return;
        }
        if (!state.userId) return;
        if (syncUnsubscribe) syncUnsubscribe();
        
        const sessionPath = `users/${state.userId}/sessions/${getSessionId()}`;
        syncUnsubscribe = onSnapshot(doc(db, sessionPath), (snap) => {
            if(snap.exists()) {
                const data = snap.data();
                state.statuses = data.statuses || {};
                state.notes = data.notes || {};
                recalculateRoute();
            }
        });

        const localesSnap = await getDocs(collection(db, `users/${state.userId}/locales`));
        localesSnap.forEach(d => {
            const loc = d.data();
            if(!state.raw.some(r => r.place_id === d.id)) state.raw.push({ ...loc, place_id: d.id });
        });
        recalculateRoute();
        showToast("☁️ Nube sincronizada");
        listenProgress();
        startPartnerTracking();
    }

    async function syncSessionUpdate() {
        if (!isFirebaseConfigured) {
            localStorage.setItem('brt_statuses', JSON.stringify(state.statuses));
            localStorage.setItem('brt_notes', JSON.stringify(state.notes));
            return;
        }
        if(!state.userId) return;
        const sessionPath = `users/${state.userId}/sessions/${getSessionId()}`;
        await setDoc(doc(db, sessionPath), {
            statuses: state.statuses,
            notes: state.notes,
            updatedAt: serverTimestamp()
        }, { merge: true });
    }

    // --- PUNTO 4: PANEL DE PROGRESO ---
    async function syncProgressUpdate() {
        if (!state.userId || !state.userGroup || !isFirebaseConfigured) return;
        const myVisible = state.raw.filter((r, i) => isShopVisible(i)).length;
        const myVisited = Object.keys(state.statuses).filter(i => isShopVisible(parseInt(i))).length;
        setDoc(doc(db, 'config', 'progress'), {
            [state.userGroup]: { count: myVisited, total: myVisible, uid: state.userId, lastUpdate: serverTimestamp() }
        }, { merge: true }).catch(() => {});
    }

    let progressUnsubscribe = null;
    function listenProgress() {
        if (!isFirebaseConfigured) return;
        if (progressUnsubscribe) progressUnsubscribe();
        progressUnsubscribe = onSnapshot(doc(db, 'config', 'progress'), (snap) => {
            if (!snap.exists()) return;
            updateProgressUI(snap.data());
        });
    }

    function updateProgressUI(data) {
        const dual = document.getElementById('dual-progress');
        if (!dual) return;
        dual.style.display = 'block';
        ['A', 'B'].forEach(g => {
            const d = data[g];
            if (!d) return;
            const pct = d.total > 0 ? Math.round(d.count / d.total * 100) : 0;
            const fill = document.getElementById(`prog-${g.toLowerCase()}-fill`);
            const text = document.getElementById(`prog-${g.toLowerCase()}-text`);
            if (fill) fill.style.width = pct + '%';
            if (text) text.innerText = `${d.count}/${d.total} (${pct}%)`;
        });
    }

    // --- PUNTO 5: GPS EN TIEMPO REAL ---
    let partnerMarker = null;
    let _lastRTDBWrite = 0;

    function updateLocationInRTDB(loc) {
        if (!rtdb || !state.userGroup) return;
        const now = Date.now();
        if (now - _lastRTDBWrite < 5000) return;
        _lastRTDBWrite = now;
        set(ref(rtdb, `locations/${state.userGroup}`), {
            lat: loc.lat,
            lng: loc.lng,
            name: state.userName || `Zona ${state.userGroup}`,
            group: state.userGroup,
            lastSeen: now
        }).catch(() => {});
    }

    function startPartnerTracking() {
        if (!rtdb || !state.userGroup) return;
        const partnerGroup = state.userGroup === 'A' ? 'B' : 'A';
        onValue(ref(rtdb, `locations/${partnerGroup}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            if (Date.now() - data.lastSeen > 300000) return;
            if (window.google && map) updatePartnerMarker(data);
        });
    }

    function updatePartnerMarker(data) {
        if (!window.google || !map) return;
        const pos = new google.maps.LatLng(data.lat, data.lng);
        const color = data.group === 'A' ? '#3b82f6' : '#a855f7';
        if (!partnerMarker) {
            partnerMarker = new google.maps.Marker({
                position: pos, map, zIndex: 999,
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: color, fillOpacity: 0.95, strokeColor: 'white', strokeWeight: 3 },
                label: { text: (data.name || `Z${data.group}`).split(' ')[0].substring(0, 6), color: 'white', fontSize: '9px', fontWeight: '900' },
                title: `Zona ${data.group} — ${data.name || ''}`
            });
        } else {
            partnerMarker.setPosition(pos);
        }
    }

    // --- MAPS ---
    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 16,
            center: { lat: -34.5955, lng: -58.4014 },
            disableDefaultUI: true,
            styles: [
                { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
                { "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#9e9e9e" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#212121" }] },
                { "featureType": "administrative", "elementType": "geometry", "stylers": [{ "color": "#757575" }] },
                { "featureType": "administrative.country", "elementType": "labels.text.fill", "stylers": [{ "color": "#9e9e9e" }] },
                { "featureType": "administrative.land_parcel", "stylers": [{ "visibility": "off" }] },
                { "featureType": "administrative.locality", "elementType": "labels.text.fill", "stylers": [{ "color": "#bdbdbd" }] },
                { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] },
                { "featureType": "poi.park", "elementType": "geometry", "stylers": [{ "color": "#181818" }] },
                { "featureType": "poi.park", "elementType": "labels.text.fill", "stylers": [{ "color": "#616161" }] },
                { "featureType": "poi.park", "elementType": "labels.text.stroke", "stylers": [{ "color": "#1b1b1b" }] },
                { "featureType": "road", "elementType": "geometry.fill", "stylers": [{ "color": "#2c2c2c" }] },
                { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#383838" }, { "weight": 1 }] },
                { "featureType": "road", "elementType": "labels.text.fill", "stylers": [{ "color": "#8a8a8a" }] },
                { "featureType": "road.arterial", "elementType": "geometry", "stylers": [{ "color": "#373737" }] },
                { "featureType": "road.highway", "elementType": "geometry", "stylers": [{ "color": "#3c3c3c" }] },
                { "featureType": "road.highway.controlled_access", "elementType": "geometry", "stylers": [{ "color": "#4e4e4e" }] },
                { "featureType": "road.local", "elementType": "labels.text.fill", "stylers": [{ "color": "#616161" }] },
                { "featureType": "transit", "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#000000" }] },
                { "featureType": "water", "elementType": "labels.text.fill", "stylers": [{ "color": "#3d3d3d" }] }
            ],
            gestureHandling: "greedy"
        });

        window.CustomMarker = function(latLng, map, args) { this.latLng = latLng; this.args = args; this.setMap(map); };
        window.CustomMarker.prototype = Object.create(google.maps.OverlayView.prototype);
        window.CustomMarker.prototype.onAdd = function() {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.innerHTML = `<div class="pin-marker ${this.args.isNext ? 'next' : ''}" style="background: ${this.args.color};">${this.args.label}</div>`;
            div.onclick = () => this.args.onClick();
            this.div = div;
            this.getPanes().overlayMouseTarget.appendChild(div);
        };
        window.CustomMarker.prototype.draw = function() {
            const pos = this.getProjection().fromLatLngToDivPixel(this.latLng);
            this.div.style.left = (pos.x - (this.args.isNext ? 19 : 14)) + 'px';
            this.div.style.top = (pos.y - (this.args.isNext ? 19 : 14)) + 'px';
        };
        window.CustomMarker.prototype.onRemove = function() { if(this.div) this.div.remove(); };

        directionsService = new google.maps.DirectionsService();
        placesService = new google.maps.places.PlacesService(map);

        recalculateRoute();
        startGPS();
        initControls();
        
        map.addListener('center_changed', () => state.lastMapMoveTime = Date.now());
        map.addListener('idle', () => searchPlaces(map.getCenter()));
    }
    window.initMap = initMap;

    // --- GPS ---
    function startGPS() {
        const dot = document.getElementById('dot');
        const accText = document.getElementById('acc');
        
        const geoOptions = { 
            enableHighAccuracy: true, 
            maximumAge: 0, 
            timeout: 20000 
        };

        navigator.geolocation.watchPosition(
            (pos) => {
                const acc = Math.round(pos.coords.accuracy);
                if (acc > GPS_ACCURACY_THRESHOLD) {
                    accText.innerHTML = `±${acc}m <span style="color:var(--accent-yellow)">(Buscando mejor señal...)</span>`;
                    return;
                }
                const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                state.userAcc = acc;
                accText.innerHTML = `GPS: ±${acc}m`;
                dot.className = acc <= 20 ? "dot fine" : (acc <= 50 ? "dot ok" : "dot searching");
                
                const distMoved = state.userLoc ? google.maps.geometry.spherical.computeDistanceBetween(new google.maps.LatLng(loc), new google.maps.LatLng(state.userLoc)) : Infinity;
                if(distMoved > 10) {
                    state.userLoc = loc;
                    recalculateRoute();
                } else {
                    state.userLoc = loc;
                }
                updateUserMarker();
                updateLocationInRTDB(loc);
            },
            (err) => {
                dot.className = "dot error"; 
                let msg = "Error GPS";
                if (err.code === 1) {
                    msg = "¡Permiso Denegado!";
                    showToast("⚠️ Para usar el navegador, activá el GPS en la configuración del sitio.");
                } else if (err.code === 2) {
                    msg = "Señal no disponible";
                    showToast("🛰️ Sin señal. Intentá moverte a un área abierta o activar el Wi-Fi.");
                } else if (err.code === 3) {
                    msg = "GPS lento";
                    showToast("⏳ El GPS tarda en responder. Verificá si estás bajo techo.");
                }
                accText.innerText = msg;
                fetchIPFallback(); 
            },
            geoOptions
        );
    }

    function fetchIPFallback() {
        fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
            if(!state.userLoc) {
                state.userLoc = { lat: data.latitude, lng: data.longitude };
                recalculateRoute(); updateUserMarker();
            }
        });
    }

    function updateUserMarker() {
        if(!state.userLoc) return;
        const latLng = new google.maps.LatLng(state.userLoc);
        if(!userMarker) {
            userMarker = new google.maps.Marker({ position: latLng, map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 } });
            const overlay = new google.maps.OverlayView();
            overlay.onAdd = function() {
                const div = document.createElement('div');
                div.innerHTML = `<div class="user-location-pulse"></div><div class="user-location-dot"></div>`;
                div.style.position = 'absolute';
                this.getPanes().overlayMouseTarget.appendChild(div);
                this.div = div;
            };
            overlay.draw = function() {
                const pos = this.getProjection().fromLatLngToDivPixel(latLng);
                this.div.style.left = pos.x + 'px'; this.div.style.top = pos.y + 'px';
            };
            overlay.setMap(map);
            userAccCircle = new google.maps.Circle({ map, strokeColor: "#3b82f6", strokeOpacity: 0.2, strokeWeight: 1, fillColor: "#3b82f6", fillOpacity: 0.1 });
        }
        userMarker.setPosition(latLng);
        userAccCircle.setCenter(latLng);
        userAccCircle.setRadius(state.userAcc);
    }

    // --- PLACES ---
    async function searchPlaces(center) {
        if (Date.now() - state.lastSearchTime < PLACES_THROTTLE || (!state.userId && isFirebaseConfigured) || !placesService) return;
        state.lastSearchTime = Date.now();
        
        placesService.nearbySearch({ location: center, radius: 1500, type: ['hair_care'] }, (res, status) => {
            if(status !== 'OK') return;
            let newFound = 0;
            res.forEach(place => {
                const alreadyExists = state.raw.some(r => r.place_id === place.place_id || google.maps.geometry.spherical.computeDistanceBetween(place.geometry.location, new google.maps.LatLng(r.lat, r.lng)) < 30);
                if(!alreadyExists) {
                    const newLoc = {
                        name: place.name, addr: place.vicinity, 
                        lat: place.geometry.location.lat(), lng: place.geometry.location.lng(),
                        type: place.name.toLowerCase().includes('barber') ? 'barbershop' : 'hairdresser',
                        place_id: place.place_id, source: 'places_api'
                    };
                    state.raw.push(newLoc);
                    newFound++;
                    if (isFirebaseConfigured && state.userId) {
                        setDoc(doc(db, `users/${state.userId}/locales`, place.place_id), newLoc, { merge: true });
                    }
                }
            });
            if(newFound > 0) { showToast(`✨ ${newFound} locales nuevos`); recalculateRoute(); }
        });
    }

    // --- ROUTE & RENDER ---
    function recalculateRoute() {
        if (!window.google || !map) return;
        
        const pending = state.raw.map((r, i) => i).filter(i => !state.statuses[i] && isShopVisible(i));
        if(pending.length === 0) { state.routeOrder = []; render(); return; }

        let curr = state.userLoc || { lat: -34.5955, lng: -58.4014 };
        let sorted = [];
        let pool = [...pending];

        while(pool.length > 0) {
            let near = null, minDist = Infinity, poolIdx = -1;
            pool.forEach((rawIdx, i) => {
                const r = state.raw[rawIdx];
                const d = google.maps.geometry.spherical.computeDistanceBetween(new google.maps.LatLng(curr), new google.maps.LatLng(r.lat, r.lng));
                if(d < minDist) { minDist = d; near = rawIdx; poolIdx = i; }
            });
            sorted.push(near);
            curr = { lat: state.raw[near].lat, lng: state.raw[near].lng };
            pool.splice(poolIdx, 1);
        }
        state.routeOrder = sorted;
        fetchWalkingRoute();
        render();
    }

    async function fetchWalkingRoute() {
        if (!directionsService) return;
        polylines.forEach(p => p.setMap(null));
        polylines = [];
        if(state.routeOrder.length === 0) return;
        
        const limit = 22;
        const sub = state.routeOrder.slice(0, limit);
        const start = state.userLoc || { lat: -34.5955, lng: -58.4014 };
        
        directionsService.route({
            origin: start,
            destination: { lat: state.raw[sub[sub.length-1]].lat, lng: state.raw[sub[sub.length-1]].lng },
            waypoints: sub.slice(0, -1).map(i => ({ location: { lat: state.raw[i].lat, lng: state.raw[i].lng }, stopover: true })),
            travelMode: 'WALKING'
        }, (result, status) => {
            if(status === 'OK') {
                let mins = 0; result.routes[0].legs.forEach(l => mins += l.duration.value);
                const pTitle = document.getElementById('p-title');
                const visited = Object.keys(state.statuses).length;
                pTitle.innerText = `Ruta: ~${Math.round(mins/60)} min • Pendientes (${state.routeOrder.length}) • Visitadas (${visited})`;
                document.getElementById('p-fill').style.width = (visited / (state.raw.length||1) * 100) + '%';
                polylines.push(new google.maps.Polyline({ path: result.routes[0].overview_path, strokeColor: "#3b82f6", strokeOpacity: 0.7, strokeWeight: 6, map }));
            }
        });
    }

    function render() {
        if (!window.google || !map || !window.CustomMarker) return;
        markers.forEach(m => m.setMap(null));
        markers = [];
        state.raw.forEach((r, i) => {
            if(!isShopVisible(i)) return;
            if(!state.showVisited && state.statuses[i]) return;
            const isNext = state.routeOrder[0] === i;
            const orderIdx = state.routeOrder.indexOf(i);
            const baseColor = state.userGroup === 'A' ? '#3b82f6' : state.userGroup === 'B' ? '#a855f7' : (r.type === 'barbershop' ? '#3b82f6' : '#a855f7');
            const color = state.statuses[i] ? getStatusColor(state.statuses[i]) : baseColor;
            const label = state.statuses[i] ? getStatusEmoji(state.statuses[i]) : (orderIdx >= 0 ? orderIdx + 1 : '');
            
            markers.push(new CustomMarker(new google.maps.LatLng(r.lat, r.lng), map, {
                color, label, isNext, onClick: () => {
                    map.panTo({ lat: r.lat, lng: r.lng });
                    const card = document.getElementById(`card-${i}`);
                    if(card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setPanelState('expanded');
                }
            }));
        });

        const nextVisit = document.getElementById('next-visit');
        const cardList = document.getElementById('card-list');
        nextVisit.innerHTML = ''; cardList.innerHTML = '';
        
        if(state.routeOrder.length > 0) nextVisit.appendChild(createCard(state.routeOrder[0], true));
        state.routeOrder.slice(1).forEach(idx => cardList.appendChild(createCard(idx, false)));
        if(state.showVisited) {
            Object.keys(state.statuses).forEach(idx => {
                const i = parseInt(idx);
                if(!isShopVisible(i)) return;
                if(!state.routeOrder.includes(i)) cardList.appendChild(createCard(i, false));
            });
        }
        updateCounter();
    }

    function createCard(idx, isNext) {
        const item = state.raw[idx];
        const status = state.statuses[idx];
        const note = state.notes[idx];
        const card = document.createElement('div');
        card.className = `card ${isNext ? 'next' : ''}`;
        card.id = `card-${idx}`;
        card.onclick = (e) => { if(!e.target.closest('button')) map.panTo({ lat: item.lat, lng: item.lng }); };
        
        const baseColor = state.userGroup === 'A' ? '#3b82f6' : state.userGroup === 'B' ? '#a855f7' : (item.type === 'barbershop' ? '#3b82f6' : '#a855f7');
        const badgeColor = status ? getStatusColor(status) : baseColor;
        const orderIdx = state.routeOrder.indexOf(idx);
        const label = status ? getStatusEmoji(status) : (orderIdx >= 0 ? orderIdx + 1 : '');
        
        card.innerHTML = `
            <div class="card-badge" style="background: ${badgeColor}">${label}</div>
            <div class="card-info">
                <div class="card-name">${item.name}</div>
                <div class="card-addr">${item.addr}</div>
                ${note ? `<div class="card-note-preview">💬 "${truncate(note, 30)}"</div>` : ''}
                <div class="card-actions">
                    <button class="btn-status ok ${status === 'ok' ? 'active' : ''}" onclick="window.toggleStatus(${idx}, 'ok')">✓ OK</button>
                    <button class="btn-status maybe ${status === 'maybe' ? 'active' : ''}" onclick="window.toggleStatus(${idx}, 'maybe')">? DUDA</button>
                    <button class="btn-status no ${status === 'no' ? 'active' : ''}" onclick="window.toggleStatus(${idx}, 'no')">✗ NO</button>
                    <button class="btn-circle ${note ? 'has-note' : ''}" onclick="window.openNote(${idx})">💬</button>
                </div>
            </div>
        `;
        return card;
    }

    window.toggleStatus = async (idx, s) => {
        if (state.statuses[idx] === s) {
            delete state.statuses[idx];
            if (state.userId && isFirebaseConfigured) {
                deleteDoc(doc(db, `users/${state.userId}/visits`, String(idx))).catch(() => {});
            }
        } else {
            state.statuses[idx] = s;
            if (state.userId && isFirebaseConfigured) {
                const shop = state.raw[idx];
                setDoc(doc(db, `users/${state.userId}/visits`, String(idx)), {
                    status: s,
                    visitedAt: serverTimestamp(),
                    uid: state.userId,
                    group: state.userGroup || null,
                    shopName: shop.name,
                    shopAddr: shop.addr,
                    shopLat: shop.lat,
                    shopLng: shop.lng
                }, { merge: true }).catch(() => {});
            }
        }
        await syncSessionUpdate();
        syncProgressUpdate();
        recalculateRoute();
        if(state.routeOrder.length > 0) {
            const next = state.raw[state.routeOrder[0]];
            map.panTo({ lat: next.lat, lng: next.lng });
            showToast(`👉 Siguiente: ${next.name}`);
        }
    };

    window.openNote = (idx) => {
        state.activeNoteIdx = idx;
        const modal = document.getElementById('modal');
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-name').innerText = state.raw[idx].name;
        document.getElementById('note-text').value = state.notes[idx] || '';
        overlay.style.display = 'block';
        
        if(window.visualViewport) {
            const h = () => modal.style.bottom = (window.innerHeight - window.visualViewport.height) + 'px';
            window.visualViewport.addEventListener('resize', h);
            state.viewH = h; h();
        }
        setTimeout(() => { overlay.style.opacity = '1'; modal.style.transform = 'translateY(0)'; }, 10);
    };

    window.closeNote = () => {
        const modal = document.getElementById('modal');
        const overlay = document.getElementById('modal-overlay');
        overlay.style.opacity = '0'; modal.style.transform = 'translateY(100%)';
        if(state.viewH) window.visualViewport.removeEventListener('resize', state.viewH);
        setTimeout(() => overlay.style.display = 'none', 350);
    };

    window.saveNote = async () => {
        const t = document.getElementById('note-text').value.trim();
        if(t) state.notes[state.activeNoteIdx] = t; else delete state.notes[state.activeNoteIdx];
        await syncSessionUpdate(); closeNote(); render();
    };

    function initControls() {
        const toggleIcon = document.querySelector('.panel-toggle-btn');
        document.getElementById('handle').onclick = () => {
            if(state.panelState === 'collapsed') setPanelState('compressed');
            else if(state.panelState === 'compressed') setPanelState('expanded');
            else setPanelState('collapsed');
            
            if (toggleIcon) {
                toggleIcon.innerText = state.panelState === 'expanded' ? '▼' : '▲';
            }
        };
        document.getElementById('login-btn').onclick = handleLogin;
        document.getElementById('main-login-btn').onclick = handleLogin;
        document.getElementById('logout-btn').onclick = handleLogout;
        document.getElementById('toggle-visited').onclick = () => {
            state.showVisited = !state.showVisited;
            document.getElementById('toggle-visited').style.color = state.showVisited ? 'var(--accent-blue)' : 'var(--muted)';
            render();
        };
        document.getElementById('fab').onclick = () => { if(state.userLoc) map.panTo(state.userLoc); };
    }

    function setPanelState(s) { state.panelState = s; document.getElementById('panel').className = s; }
    function getStatusColor(s) { return { ok: 'var(--accent-green)', maybe: 'var(--accent-yellow)', no: 'var(--accent-red)' }[s]; }
    function getStatusEmoji(s) { return { ok: '✓', maybe: '~', no: '✗' }[s]; }
    function truncate(s, n) { return s.length > n ? s.substr(0, n-1) + '...' : s; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 3000); }
    function updateCounter() {
        const myTotal = state.raw.filter((r, i) => isShopVisible(i)).length;
        const visited = Object.keys(state.statuses).filter(i => isShopVisible(parseInt(i))).length;
        const pill = document.getElementById('counter');
        pill.innerText = `${visited}/${myTotal} ✓`;
        pill.classList.toggle('done', visited === myTotal && myTotal > 0);
    }
</script>
